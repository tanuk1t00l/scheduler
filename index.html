<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>링크 모음</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a}

.nav-wrap{position:fixed;top:1rem;right:1.25rem;z-index:200;display:flex;align-items:flex-start;gap:6px;user-select:none}
.nav-panel{display:flex;flex-direction:column;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;min-width:140px;max-width:220px}
.nav-titlebar{display:flex;align-items:center;justify-content:space-between;padding:5px 6px 5px 8px;cursor:grab;background:transparent;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.nav-titlebar:active{cursor:grabbing}
.nav-grip{color:#ccc;font-size:13px;pointer-events:none}
.nav-body{display:flex;flex-direction:column;gap:1px;padding:4px 6px}
.nav-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background 0.15s,color 0.15s;font-family:inherit;width:100%;text-align:left}
.nav-item:hover,.nav-item.active{background:#f0f0ee;color:#1a1a1a}
.nav-item .drag-handle{font-size:12px;color:#ccc;cursor:grab;flex-shrink:0;display:none}
.nav-item .drag-handle:active{cursor:grabbing}
.editing-nav .nav-item .drag-handle{display:block}
.nav-item.nav-dragging{opacity:0.35}
.nav-item.nav-drag-over-top{box-shadow:0 -2px 0 #3b82f6}
.nav-item.nav-drag-over-bottom{box-shadow:0 2px 0 #3b82f6}
.nav-sep{height:0.5px;background:rgba(0,0,0,0.08);margin:2px 4px}

.side-btns{display:flex;flex-direction:column;gap:2px;align-items:center;padding-top:2px}
.side-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:#aaa;border-radius:6px;transition:background 0.15s,color 0.15s;padding:0;font-size:13px}
.side-btn:hover{background:#ebebea;color:#666}

.home-view{position:absolute;inset:0;overflow-y:auto;padding:5rem 1.5rem 4rem;display:flex;flex-direction:column;align-items:center}
.cards{display:flex;flex-direction:column;width:100%;max-width:560px;margin-top:1rem;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden}
.card{display:flex;align-items:center;cursor:pointer;transition:background 0.15s;position:relative;user-select:none;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.card:last-child{border-bottom:none}
.card:hover{background:#fafafa}
.card-name{font-size:14px;font-weight:500;color:#1a1a1a;padding:13px 16px;min-width:180px;flex-shrink:0;border-right:0.5px solid rgba(0,0,0,0.07)}
.card-url{font-size:12px;color:#aaa;padding:13px 12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-arrow{font-size:13px;color:#ccc;padding-right:14px;flex-shrink:0}
.card-actions{display:none;position:absolute;right:36px;top:50%;transform:translateY(-50%);gap:4px;background:#fff;padding:0 4px}
.card-actions button{background:#f5f5f3;border:0.5px solid rgba(0,0,0,0.1);border-radius:6px;padding:3px 6px;cursor:pointer;color:#666;font-size:12px;line-height:1}
.card-actions button:hover{background:#ebebea;color:#1a1a1a}
.card-actions .del-btn:hover{color:#e53e3e}
.editing .card:hover .card-actions{display:flex}
.editing .card .card-arrow{display:none}
.editing .card{cursor:default}
.card.card-dragging{opacity:0.4}
.card.card-drag-over{box-shadow:0 -2px 0 #3b82f6}
.edit-hint{font-size:12px;color:#aaa;display:none;width:100%;max-width:560px;margin-bottom:4px}
.editing .edit-hint{display:block}

.iframe-view{position:fixed;inset:0;z-index:100;display:none;background:#fff}
.iframe-view.open{display:block}
.iframe-view iframe{width:100%;height:100%;border:none;display:block}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem;width:340px;max-width:90vw}
.modal h3{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:1rem}
.modal label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
.modal input{width:100%;font-size:14px;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.modal input:focus{border-color:#3b82f6}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.btn-cancel{background:transparent;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:14px;color:#666;font-family:inherit}
.btn-cancel:hover{background:#f5f5f3}
.btn-confirm{background:#eff6ff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:14px;color:#2563eb;font-weight:500;font-family:inherit}
.btn-confirm:hover{background:#dbeafe}

@media (prefers-color-scheme: dark){
  html,body{background:#1a1a1a;color:#eee}
  .nav-panel{background:#2a2a2a;border-color:rgba(255,255,255,0.1)}
  .nav-titlebar{border-bottom-color:rgba(255,255,255,0.08)}
  .nav-item:hover,.nav-item.active{background:#333;color:#eee}
  .nav-item{color:#999}
  .nav-sep{background:rgba(255,255,255,0.08)}
  .side-btn{color:#555}
  .side-btn:hover{background:#2a2a2a;color:#999}
  .cards{background:#232323;border-color:rgba(255,255,255,0.08)}
  .card{border-bottom-color:rgba(255,255,255,0.06)}
  .card:hover{background:#2a2a2a}
  .card-name{color:#eee;border-right-color:rgba(255,255,255,0.06)}
  .card-url{color:#555}
  .card-arrow{color:#444}
  .card-actions{background:#232323}
  .card-actions button{background:#2a2a2a;border-color:rgba(255,255,255,0.1);color:#999}
  .card-actions button:hover{background:#333;color:#eee}
  .edit-hint{color:#555}
  .modal{background:#232323;border-color:rgba(255,255,255,0.1)}
  .modal h3{color:#eee}
  .modal label{color:#999}
  .modal input{background:#2a2a2a;border-color:rgba(255,255,255,0.1);color:#eee}
  .btn-cancel{border-color:rgba(255,255,255,0.15);color:#999}
  .btn-cancel:hover{background:#2a2a2a}
  .btn-confirm{background:#1e3a5f;color:#60a5fa}
  .btn-confirm:hover{background:#1e4080}
  .iframe-view{background:#1a1a1a}
}
</style>
</head>
<body>

<div class="nav-wrap" id="navWrap">
  <div class="nav-panel" id="navPanel">
    <div class="nav-titlebar" id="navTitlebar">
      <i class="ti ti-grip-horizontal nav-grip"></i>
    </div>
    <div class="nav-body" id="navBody"></div>
  </div>
  <div class="side-btns">
    <button class="side-btn" id="navAddBtn" title="링크 추가" style="display:none"><i class="ti ti-plus"></i></button>
    <button class="side-btn" id="navEditBtn" title="편집 모드"><i class="ti ti-adjustments-horizontal"></i></button>
    <button class="side-btn" id="navLockBtn" title="잠금"><i class="ti ti-lock-open"></i></button>
  </div>
</div>

<div class="home-view" id="homeView">
  <p class="edit-hint"><i class="ti ti-info-circle" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>드래그하거나 ↑↓ 버튼으로 순서를 바꾸고, 카드에 마우스를 올려 삭제할 수 있어요</p>
  <div class="cards" id="cardsContainer"></div>
</div>

<div class="iframe-view" id="iframeView">
  <iframe id="mainFrame" src="" title="콘텐츠 영역"></iframe>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>링크 추가</h3>
    <label>이름</label>
    <input type="text" id="inputName" placeholder="예: 검수 스케줄러" />
    <label>URL</label>
    <input type="url" id="inputUrl" placeholder="https://..." />
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">취소</button>
      <button class="btn-confirm" id="btnConfirm">추가</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_LINKS = [
  {id:1, name:'엑셀 여러 시트 합치기', url:'https://tanuk1t00l.github.io/combiner/'},
  {id:2, name:'엑셀 통파일 합치기', url:'https://tanuk1t00l.github.io/merger/'},
  {id:3, name:'이번 주 근무시간', url:'https://tanuk1t00l.github.io/workhour/'},
  {id:4, name:'검수 스케줄러', url:'https://tanuk1t00l.github.io/scheduler/'},
];
let links = JSON.parse(localStorage.getItem('lp_links') || 'null') || DEFAULT_LINKS;
let nextId = Math.max(10, ...links.map(l=>l.id+1));
let isEditing=false, isLocked=false, activeId=null;
function saveLinks(){ localStorage.setItem('lp_links', JSON.stringify(links)); }
function savePos(x,y){ localStorage.setItem('lp_pos', JSON.stringify({x,y})); }
let cardDragSrc=null, navDragSrc=null;

const cardsContainer=document.getElementById('cardsContainer');
const navBody=document.getElementById('navBody');
const navWrap=document.getElementById('navWrap');
const navTitlebar=document.getElementById('navTitlebar');
const iframeView=document.getElementById('iframeView');
const mainFrame=document.getElementById('mainFrame');
const homeView=document.getElementById('homeView');
const modalBg=document.getElementById('modalBg');
const inputName=document.getElementById('inputName');
const inputUrl=document.getElementById('inputUrl');
const navAddBtn=document.getElementById('navAddBtn');
const navEditBtn=document.getElementById('navEditBtn');
const navLockBtn=document.getElementById('navLockBtn');

// ── 메뉴 패널 드래그 이동 ──────────────────────────────
let panelDragging=false, panelOffX=0, panelOffY=0;

navTitlebar.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  panelDragging=true;
  const rect=navWrap.getBoundingClientRect();
  panelOffX=e.clientX-rect.left;
  panelOffY=e.clientY-rect.top;
  navWrap.style.transition='none';
  e.preventDefault();
});

document.addEventListener('mousemove', e=>{
  if(!panelDragging) return;
  let x=e.clientX-panelOffX;
  let y=e.clientY-panelOffY;
  const maxX=window.innerWidth-navWrap.offsetWidth;
  const maxY=window.innerHeight-navWrap.offsetHeight;
  x=Math.max(0,Math.min(x,maxX));
  y=Math.max(0,Math.min(y,maxY));
  navWrap.style.right='auto';
  navWrap.style.left=x+'px';
  navWrap.style.top=y+'px';
});

document.addEventListener('mouseup', ()=>{
  if(panelDragging) savePos(parseInt(navWrap.style.left),parseInt(navWrap.style.top));
  panelDragging=false;
});

// 터치 지원
navTitlebar.addEventListener('touchstart', e=>{
  const t=e.touches[0];
  panelDragging=true;
  const rect=navWrap.getBoundingClientRect();
  panelOffX=t.clientX-rect.left;
  panelOffY=t.clientY-rect.top;
  e.preventDefault();
},{passive:false});

document.addEventListener('touchmove', e=>{
  if(!panelDragging) return;
  const t=e.touches[0];
  let x=t.clientX-panelOffX;
  let y=t.clientY-panelOffY;
  const maxX=window.innerWidth-navWrap.offsetWidth;
  const maxY=window.innerHeight-navWrap.offsetHeight;
  x=Math.max(0,Math.min(x,maxX));
  y=Math.max(0,Math.min(y,maxY));
  navWrap.style.right='auto';
  navWrap.style.left=x+'px';
  navWrap.style.top=y+'px';
  e.preventDefault();
},{passive:false});

document.addEventListener('touchend', ()=>{
  if(panelDragging) savePos(parseInt(navWrap.style.left),parseInt(navWrap.style.top));
  panelDragging=false;
});

// ── 링크 열기 / 홈 ───────────────────────────────────
function openLink(lk, newTab){
  if(isEditing) return;
  if(newTab){ window.open(lk.url,'_blank'); return; }
  activeId=lk.id;
  mainFrame.src=lk.url;
  iframeView.classList.add('open');
  renderNav();
}
function goHome(){
  activeId=null;
  iframeView.classList.remove('open');
  mainFrame.src='';
  renderNav();
}

// ── 메뉴 렌더 ────────────────────────────────────────
function renderNav(){
  navBody.innerHTML='';

  if(activeId!==null){
    const h=document.createElement('button');
    h.className='nav-item';
    h.innerHTML='<i class="ti ti-home" style="font-size:13px"></i>홈';
    h.onclick=goHome;
    navBody.appendChild(h);
    const sep=document.createElement('div');
    sep.className='nav-sep';
    navBody.appendChild(sep);
  }

  links.forEach((lk,idx)=>{
    const btn=document.createElement('button');
    btn.className='nav-item'+(lk.id===activeId?' active':'');
    btn.dataset.idx=idx;
    btn.draggable=isEditing&&!isLocked;
    if(isEditing&&!isLocked){
      btn.innerHTML=`<i class="ti ti-grip-vertical drag-handle"></i>${lk.name}`;
    } else {
      btn.textContent=lk.name;
    }
    btn.onclick=e=>{ if(e.target.closest('.drag-handle')) return; openLink(lk, e.ctrlKey||e.metaKey); };

    btn.addEventListener('dragstart',e=>{
      navDragSrc=idx;
      btn.classList.add('nav-dragging');
      e.dataTransfer.effectAllowed='move';
    });
    btn.addEventListener('dragend',()=>{
      btn.classList.remove('nav-dragging');
      navBody.querySelectorAll('.nav-drag-over-top,.nav-drag-over-bottom').forEach(el=>el.classList.remove('nav-drag-over-top','nav-drag-over-bottom'));
    });
    btn.addEventListener('dragover',e=>{
      e.preventDefault();
      if(navDragSrc===null||navDragSrc===idx) return;
      const mid=btn.getBoundingClientRect().top+btn.offsetHeight/2;
      btn.classList.remove('nav-drag-over-top','nav-drag-over-bottom');
      btn.classList.add(e.clientY<mid?'nav-drag-over-top':'nav-drag-over-bottom');
    });
    btn.addEventListener('dragleave',()=>btn.classList.remove('nav-drag-over-top','nav-drag-over-bottom'));
    btn.addEventListener('drop',e=>{
      e.preventDefault();
      btn.classList.remove('nav-drag-over-top','nav-drag-over-bottom');
      if(navDragSrc===null||navDragSrc===idx) return;
      const insertAfter=e.clientY>=btn.getBoundingClientRect().top+btn.offsetHeight/2;
      const moved=links.splice(navDragSrc,1)[0];
      let target=idx>navDragSrc?idx-1:idx;
      if(insertAfter) target++;
      links.splice(target,0,moved);
      navDragSrc=null;
      render();
    });
    navBody.appendChild(btn);
  });

  if(isEditing&&!isLocked) navBody.classList.add('editing-nav');
  else navBody.classList.remove('editing-nav');

  navAddBtn.style.display=(!isLocked&&isEditing)?'':'none';
  navEditBtn.style.display=isLocked?'none':'';
  navEditBtn.innerHTML=isEditing?'<i class="ti ti-check"></i>':'<i class="ti ti-adjustments-horizontal"></i>';
  navEditBtn.title=isEditing?'편집 완료':'편집 모드';
  navLockBtn.innerHTML=isLocked?'<i class="ti ti-lock"></i>':'<i class="ti ti-lock-open"></i>';
  navLockBtn.title=isLocked?'잠금 해제':'잠금';
}

// ── 카드 렌더 ────────────────────────────────────────
function renderCards(){
  cardsContainer.innerHTML='';
  links.forEach((lk,idx)=>{
    const card=document.createElement('div');
    card.className='card';
    card.draggable=isEditing&&!isLocked;
    card.innerHTML=`
      <div class="card-name">${lk.name}</div>
      <div class="card-url">${lk.url}</div>
      <i class="ti ti-arrow-right card-arrow"></i>
      <div class="card-actions">
        <button class="move-up" data-i="${idx}"><i class="ti ti-chevron-up"></i></button>
        <button class="move-down" data-i="${idx}"><i class="ti ti-chevron-down"></i></button>
        <button class="del-btn" data-i="${idx}"><i class="ti ti-trash"></i></button>
      </div>`;
    if(!isEditing) card.onclick=e=>openLink(lk, e.ctrlKey||e.metaKey);
    card.addEventListener('dragstart',e=>{cardDragSrc=idx;card.classList.add('card-dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('card-dragging');cardsContainer.querySelectorAll('.card-drag-over').forEach(el=>el.classList.remove('card-drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('card-drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('card-drag-over'));
    card.addEventListener('drop',e=>{e.preventDefault();card.classList.remove('card-drag-over');if(cardDragSrc===null||cardDragSrc===idx)return;const m=links.splice(cardDragSrc,1)[0];links.splice(idx,0,m);render();});
    cardsContainer.appendChild(card);
  });
  cardsContainer.querySelectorAll('.move-up').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const i=+btn.dataset.i;if(i>0){[links[i-1],links[i]]=[links[i],links[i-1]];render();}}));
  cardsContainer.querySelectorAll('.move-down').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const i=+btn.dataset.i;if(i<links.length-1){[links[i],links[i+1]]=[links[i+1],links[i]];render();}}));
  cardsContainer.querySelectorAll('.del-btn').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();links.splice(+btn.dataset.i,1);render();}));
  if(isEditing) homeView.classList.add('editing'); else homeView.classList.remove('editing');
}

function render(){renderCards();renderNav();saveLinks();}

navEditBtn.onclick=()=>{if(isLocked)return;isEditing=!isEditing;if(isEditing)goHome();render();};
navLockBtn.onclick=()=>{isLocked=!isLocked;if(isLocked)isEditing=false;render();};
navAddBtn.onclick=()=>{inputName.value='';inputUrl.value='';modalBg.classList.add('open');inputName.focus();};
document.getElementById('btnCancel').onclick=()=>modalBg.classList.remove('open');
modalBg.onclick=e=>{if(e.target===modalBg)modalBg.classList.remove('open');};
document.getElementById('btnConfirm').onclick=()=>{
  const name=inputName.value.trim(),url=inputUrl.value.trim();
  if(!name||!url)return;
  links.push({id:nextId++,name,url});
  modalBg.classList.remove('open');
  render();
};
inputUrl.onkeydown=e=>{if(e.key==='Enter')document.getElementById('btnConfirm').click();};

// 저장된 패널 위치 복원
const savedPos = JSON.parse(localStorage.getItem('lp_pos')||'null');
if(savedPos){
  navWrap.style.right='auto';
  navWrap.style.left=savedPos.x+'px';
  navWrap.style.top=savedPos.y+'px';
}

render();
</script>
</body>
</html>
