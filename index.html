<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<title>번역 검수 작업 스케줄러</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f8f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;color:#1a1a1a;min-height:100vh}
.page-wrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:18px;font-weight:500;color:#1a1a1a;margin-bottom:0.25rem}
.subtitle{font-size:13px;color:#888;margin-bottom:1.5rem}

/* 일감 목록 접기 */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.section-title{font-size:12px;font-weight:500;color:#888;letter-spacing:0.02em}
.btn-collapse{background:transparent;border:0.5px solid #d0d0cc;border-radius:6px;padding:3px 10px;font-size:11px;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-collapse:hover{background:#f0f0ee;color:#333}
.collapsible{overflow:hidden;transition:max-height 0.25s ease,opacity 0.2s ease;max-height:600px;opacity:1}
.collapsible.collapsed{max-height:0;opacity:0;pointer-events:none}

.header-row{display:grid;grid-template-columns:90px minmax(0,1fr) 100px 110px 110px 36px;gap:8px;margin-bottom:4px}
.col-label{font-size:11px;color:#aaa;text-align:center}
.job-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.job-row{display:grid;grid-template-columns:90px minmax(0,1fr) 100px 110px 110px 36px;gap:8px;align-items:center}
.job-row input,.job-row select{font-size:13px;padding:0 8px;height:34px;border:0.5px solid #d0d0cc;border-radius:7px;background:#fff;color:#1a1a1a;width:100%}
.job-row input[type=date]{font-size:11px;padding:0 4px;letter-spacing:-0.02em;font-family:'Noto Sans KR','Noto Sans',sans-serif}
.job-row input:focus,.job-row select:focus{outline:none;border-color:#999}
.btn-remove{width:34px;height:34px;border:0.5px solid #d0d0cc;border-radius:7px;background:transparent;cursor:pointer;color:#aaa;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-remove:hover{background:#fef2f2;color:#c0392b;border-color:#f5c6c6}
.btn-remove:disabled{opacity:0.3;cursor:not-allowed}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:#888;background:transparent;border:0.5px dashed #ccc;border-radius:7px;padding:8px;cursor:pointer;width:100%;margin-bottom:1.25rem}
.btn-add:hover{background:#f5f5f3;color:#333}

/* 옵션 행 */
.options-row{display:flex;gap:1.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.option-group{display:flex;flex-direction:column;gap:6px}
.option-group .section-label{font-size:12px;font-weight:500;color:#888;letter-spacing:0.02em}
.toggle-group{display:flex;border:0.5px solid #d0d0cc;border-radius:7px;overflow:hidden;width:fit-content}
.tog-btn{padding:6px 14px;font-size:12px;background:transparent;border:none;cursor:pointer;color:#888}
.tog-btn.active{background:#f0f0ee;color:#1a1a1a;font-weight:500}
.tog-btn:not(:last-child){border-right:0.5px solid #d0d0cc}
.mode-hint{font-size:11px;color:#bbb;margin-top:2px}

.btn-row{display:flex;gap:8px;margin-bottom:1.5rem}
.btn-calc{background:#1a1a1a;border:none;border-radius:7px;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;color:#fff;flex:1}
.btn-calc:hover{background:#333}
.btn-dl{background:transparent;border:0.5px solid #d0d0cc;border-radius:7px;font-size:13px;padding:8px 16px;cursor:pointer;color:#666;display:flex;align-items:center;gap:5px;flex:1;justify-content:center}
.btn-dl:hover{background:#f5f5f3;color:#1a1a1a}
.error{font-size:12px;color:#c0392b;margin-bottom:0.75rem;display:none}
.memo-wrap{margin-top:2rem;border-top:0.5px solid #e8e8e6;padding-top:1.5rem}
.memo-wrap .section-title{font-size:12px;font-weight:500;color:#888;letter-spacing:0.02em;display:block;margin-bottom:8px}
.memo-box{width:100%;min-height:120px;resize:vertical;border:0.5px solid #d0d0cc;border-radius:7px;padding:10px 12px;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;color:#1a1a1a;background:#fff;line-height:1.6;outline:none}
.memo-box:focus{border-color:#999}
.memo-saved{font-size:11px;color:#bbb;text-align:right;margin-top:4px;min-height:16px}

.divider{border:none;border-top:0.5px solid #e8e8e6;margin:1.5rem 0}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.metric{background:#fff;border:0.5px solid #e8e8e6;border-radius:8px;padding:12px}
.metric-label{font-size:11px;color:#aaa;margin-bottom:4px}
.metric-val{font-size:18px;font-weight:500;color:#1a1a1a}

.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:transparent;border:0.5px solid #d8d8d6;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px;color:#666;display:flex;align-items:center;justify-content:center}
.cal-nav:hover{background:#f0f0ee}
.cal-month-label{font-size:14px;font-weight:500;color:#1a1a1a}
.cal-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;min-width:500px}
.cal-day-header{font-size:11px;color:#bbb;text-align:center;padding:4px 0;border:0.5px solid transparent}
.cal-day-header.weekend{color:#e07070}
.cal-cell{min-height:70px;border:0.5px solid #e8e8e6;padding:4px;background:#fff;overflow:hidden;position:relative}
.cal-cell.other-month{background:#f8f8f6}
.cal-cell.today{border-color:#4a90d9;z-index:1}
.cal-cell.weekend-day{background:#fdfafa}
.cal-cell.skipped-day{background:#f5f5f3}
.cal-date{font-size:11px;color:#bbb;margin-bottom:2px}
.cal-cell.today .cal-date{color:#4a90d9;font-weight:500}
.cal-cell.weekend-day .cal-date{color:#e07070}
.cal-cell.skipped-day .cal-date{color:#ccc}

/* 막대: 좌우 끝 여백 없이 셀 끝까지 늘어남 */
.bar{height:15px;font-size:10px;line-height:15px;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;border-top:0.5px solid transparent;border-bottom:0.5px solid transparent}
.bar.single{border-radius:3px;border:0.5px solid transparent;margin:0 0 2px 0}
.bar.start{border-radius:3px 0 0 3px;margin-left:0;margin-right:-4px;padding-right:0;border-right:none}
.bar.mid{border-radius:0;margin-left:-4px;margin-right:-4px;padding:0;border-left:none;border-right:none}
.bar.end{border-radius:0 3px 3px 0;margin-left:-4px;padding-left:0;border-left:none}
.bar.start-end-same{border-radius:3px;margin:0 0 2px 0}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<div class="page-wrap">
  <h1>번역 검수 작업 스케줄러</h1>
  <p class="subtitle">일감별 우선순위·분량·기간을 입력하면 작업 순서와 달력 배분을 산출합니다.</p>

  <!-- 일감 목록 -->
  <div class="section-header">
    <span class="section-title">일감 목록</span>
    <button class="btn-collapse" id="btnCollapse" onclick="toggleCollapse()">▲ 접기</button>
  </div>
  <div class="collapsible" id="jobSection">
    <div class="header-row">
      <div class="col-label">우선순위</div>
      <div class="col-label">일감 이름</div>
      <div class="col-label">분량 (단어)</div>
      <div class="col-label">작업개시일</div>
      <div class="col-label">마감일</div>
      <div></div>
    </div>
    <div class="job-list" id="jobList"></div>
    <button class="btn-add" id="btnAdd" onclick="addJob()">＋ 일감 추가 (최대 10개)</button>
  </div>

  <!-- 옵션 -->
  <div class="options-row">
    <div class="option-group">
      <div class="section-label">작업 방식</div>
      <div class="toggle-group">
        <button class="tog-btn active" id="btnSeq" onclick="setMode('sequential')">→ 순차</button>
        <button class="tog-btn" id="btnPar" onclick="setMode('parallel')">⇉ 병렬</button>
      </div>
    </div>
    <div class="option-group">
      <div class="section-label">주말 처리</div>
      <div class="toggle-group">
        <button class="tog-btn active" id="wkAll" onclick="setWeekend('all')">전체 포함</button>
        <button class="tog-btn" id="wkNo" onclick="setWeekend('none')">주말 제외</button>
        <button class="tog-btn" id="wkNoSun" onclick="setWeekend('noSun')">일요일 제외</button>
        <button class="tog-btn" id="wkNoSat" onclick="setWeekend('noSat')">토요일 제외</button>
      </div>
    </div>
    <div class="option-group">
      <div class="section-label">하루 처리 가능량 (단어)</div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" id="dailyCap" min="1" placeholder="제한 없음"
          style="width:120px;height:32px;font-size:12px;padding:0 8px;border:0.5px solid #d0d0cc;border-radius:7px;background:#fff;color:#1a1a1a;outline:none"
          oninput="updateDailyCap(this.value)">
        <span style="font-size:11px;color:#bbb">비우면 제한 없음</span>
      </div>
    </div>
  </div>

  <div class="error" id="errMsg"></div>
  <div class="btn-row">
    <button class="btn-calc" onclick="calculate()">스케줄 산출하기</button>
    <button class="btn-dl" onclick="downloadJSON()">↓ JSON으로 저장</button>
  </div>

  <!-- 드래그 드롭 복원 오버레이 -->
  <div id="dropOverlay" style="display:none;position:fixed;inset:0;background:rgba(26,26,26,0.55);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px">
    <div style="background:#fff;border-radius:12px;padding:2rem 2.5rem;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)">
      <div style="font-size:32px;margin-bottom:0.75rem">&#128194;</div>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:4px">JSON 파일을 놓아주세요</div>
      <div style="font-size:12px;color:#aaa">저장된 일감 데이터를 복원합니다</div>
    </div>
  </div>

  <div id="resultArea" style="display:none">
    <hr class="divider">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="calendar-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-wrap"><div class="cal-grid" id="calGrid"></div></div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- 메모 -->
  <div class="memo-wrap">
    <span class="section-title">Memo</span>
    <textarea class="memo-box" id="memoBox" placeholder="기타 메모" oninput="saveMemo()"></textarea>
    <div class="memo-saved" id="memoSaved"></div>
  </div>
</div>

<script>
const COLORS=[
  {bg:'#E6F1FB',text:'#185FA5',border:'#B5D4F4'},
  {bg:'#E1F5EE',text:'#0F6E56',border:'#9FE1CB'},
  {bg:'#FAEEDA',text:'#854F0B',border:'#FAC775'},
  {bg:'#EEEDFE',text:'#534AB7',border:'#CECBF6'},
  {bg:'#FBEAF0',text:'#993556',border:'#F4C0D1'},
  {bg:'#EAF3DE',text:'#3B6D11',border:'#C0DD97'},
  {bg:'#FCEBEB',text:'#A32D2D',border:'#F7C1C1'},
  {bg:'#F1EFE8',text:'#444441',border:'#D3D1C7'},
  {bg:'#EEF0FE',text:'#3A3AB0',border:'#C0C4F6'},
  {bg:'#FFF3E0',text:'#7A4A00',border:'#FFCC80'},
];
const DAY_KO=['일','월','화','수','목','금','토'];
const MONTH_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let jobs=[], scheduleData=[], calYear, calMonth;
let mode='sequential';
let weekendMode='all'; // all | none | noSun | noSat
let dailyCap=0; // 0 = 제한 없음
let jobSectionOpen=true;

/* ── 접기 ── */
function toggleCollapse(){
  jobSectionOpen=!jobSectionOpen;
  const sec=document.getElementById('jobSection');
  const btn=document.getElementById('btnCollapse');
  sec.classList.toggle('collapsed',!jobSectionOpen);
  btn.textContent=jobSectionOpen?'▲ 접기':'▼ 펼치기';
}

/* ── 작업 방식 ── */
function setMode(m){
  mode=m;
  ['btnSeq','btnPar'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(m==='sequential'?'btnSeq':'btnPar').classList.add('active');
  saveLS();
}

/* ── 주말 처리 ── */
function setWeekend(w){
  weekendMode=w;
  ['wkAll','wkNo','wkNoSun','wkNoSat'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const map={all:'wkAll',none:'wkNo',noSun:'wkNoSun',noSat:'wkNoSat'};
  document.getElementById(map[w]).classList.add('active');
  saveLS();
}

function updateDailyCap(val){
  dailyCap=parseInt(val)||0;
  saveLS();
}

function isWorkDay(dateStr){
  const d=new Date(dateStr);
  const dow=d.getDay(); // 0=일,6=토
  if(weekendMode==='none'&&(dow===0||dow===6))return false;
  if(weekendMode==='noSun'&&dow===0)return false;
  if(weekendMode==='noSat'&&dow===6)return false;
  return true;
}

function isSkippedWeekend(dateStr){
  const d=new Date(dateStr);const dow=d.getDay();
  if(weekendMode==='none'&&(dow===0||dow===6))return true;
  if(weekendMode==='noSun'&&dow===0)return true;
  if(weekendMode==='noSat'&&dow===6)return true;
  return false;
}

/* 두 날짜 사이 실제 작업일 수 */
function workDaysBetween(a,b){
  let count=0;
  const cur=new Date(a);
  const end=new Date(b);
  while(cur<=end){
    const ds=dateStr(cur.getFullYear(),cur.getMonth(),cur.getDate());
    if(isWorkDay(ds))count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}

/* ── 날짜 유틸 ── */
function todayStr(){
  const t=new Date();
  return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
function offsetDate(base,days){
  const d=new Date(base);d.setDate(d.getDate()+days);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function dateStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function jobTemplate(id){const s=todayStr();return{id,name:'',words:'',start:s,end:offsetDate(s,6),priority:'2'};}

const LS_KEY='trans_sched_v1';

function saveLS(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({jobs,mode,weekendMode,dailyCap}));}catch(e){}
}
function loadLS(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(!d.jobs||d.jobs.length<2)return false;
    jobs=d.jobs;
    if(d.mode)setMode(d.mode);
    if(d.weekendMode)setWeekend(d.weekendMode);
    if(d.dailyCap){dailyCap=d.dailyCap;const el=document.getElementById('dailyCap');if(el)el.value=d.dailyCap;}
    return true;
  }catch(e){return false;}
}

/* ── 일감 CRUD ── */
function addJob(){
  if(jobs.length>=10)return;
  jobs.push(jobTemplate(Date.now()));renderJobs();saveLS();
}
function removeJob(id){
  if(jobs.length<=2)return;
  jobs=jobs.filter(j=>j.id!==id);renderJobs();saveLS();
}
function updateJob(id,field,val){
  const j=jobs.find(j=>j.id===id);if(j){j[field]=val;saveLS();}
}
function renderJobs(){
  const list=document.getElementById('jobList');list.innerHTML='';
  jobs.forEach(j=>{
    const row=document.createElement('div');row.className='job-row';
    row.innerHTML=`
      <select onchange="updateJob(${j.id},'priority',this.value)">
        <option value="1"${j.priority==='1'?' selected':''}>🔴 높음</option>
        <option value="2"${j.priority==='2'?' selected':''}>🟡 보통</option>
        <option value="3"${j.priority==='3'?' selected':''}>🟢 낮음</option>
      </select>
      <input type="text" placeholder="일감 이름" value="${j.name}" oninput="updateJob(${j.id},'name',this.value)">
      <input type="number" placeholder="단어 수" value="${j.words}" min="1" oninput="updateJob(${j.id},'words',this.value)">
      <input type="date" value="${j.start}" onchange="updateJob(${j.id},'start',this.value)">
      <input type="date" value="${j.end}" onchange="updateJob(${j.id},'end',this.value)">
      <button class="btn-remove" onclick="removeJob(${j.id})" title="삭제"${jobs.length<=2?' disabled':''}>${jobs.length<=2?'<span style="opacity:0.3">−</span>':'−'}</button>
    `;
    list.appendChild(row);
  });
  const btn=document.getElementById('btnAdd');
  btn.style.opacity=jobs.length>=10?'0.4':'1';
  btn.style.pointerEvents=jobs.length>=10?'none':'auto';
}

function showError(msg){
  const el=document.getElementById('errMsg');el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},4000);
}

/* ── 산출 ── */
function calculate(){
  for(const j of jobs){
    if(!j.name.trim())return showError('모든 일감의 이름을 입력해주세요.');
    if(!j.words||isNaN(j.words)||parseInt(j.words)<1)return showError('분량(단어 수)을 올바르게 입력해주세요.');
    if(!j.start||!j.end)return showError('작업개시일과 마감일을 모두 입력해주세요.');
    if(j.start>j.end)return showError(`"${j.name}"의 마감일이 작업개시일보다 앞서 있습니다.`);
  }
  const sorted=[...jobs].sort((a,b)=>{
    if(a.priority!==b.priority)return parseInt(a.priority)-parseInt(b.priority);
    return a.end>b.end?1:-1;
  });
  scheduleData=mode==='sequential'?calcSequential(sorted):calcParallel(sorted);
  const allDates=scheduleData.flatMap(j=>[new Date(j.schedStart),new Date(j.schedEnd)]);
  const minDate=new Date(Math.min(...allDates));
  calYear=minDate.getFullYear();calMonth=minDate.getMonth();
  document.getElementById('resultArea').style.display='block';
  renderSummary();renderCalendar();renderLegend();
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
}

/* 날짜 목록 반환 */
function getWorkDates(start, end){
  const dates=[];
  const cur=new Date(start);
  const fin=new Date(end);
  while(cur<=fin){
    const ds=dateStr(cur.getFullYear(),cur.getMonth(),cur.getDate());
    if(isWorkDay(ds)) dates.push(ds);
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

/* 날짜별 정확한 단어수 맵 생성
   cap>0이면 하루 최대 cap단어, 초과분은 map에 초과 플래그 포함
   균등 배분 후 나머지는 앞쪽에 1씩 */
function buildDailyWords(schedStart, schedEnd, totalWords){
  const workDates=getWorkDates(schedStart, schedEnd);
  const n=workDates.length;
  if(n===0) return {};
  const base=Math.floor(totalWords/n);
  let remainder=totalWords - base*n;
  const map={};
  workDates.forEach(ds=>{
    const w=base+(remainder-->0?1:0);
    const over=dailyCap>0&&w>dailyCap;
    map[ds]={words:w, over};
  });
  return map;
}

function calcSequential(sorted){
  let cursor=null;
  return sorted.map((j,idx)=>{
    const words=parseInt(j.words);
    let schedStart=(!cursor||j.start>cursor)?j.start:cursor;
    if(schedStart>j.end)schedStart=j.start;

    let schedEnd=j.end;
    let dailyWords={};

    if(dailyCap>0){
      // cap 기준으로 실제 완료일 계산
      const allDates=getWorkDates(schedStart, j.end);
      let remaining=words;
      let actualEnd=schedStart;
      for(const ds of allDates){
        const assign=Math.min(remaining, dailyCap);
        const over=assign>dailyCap; // 항상 false (assign<=cap)
        dailyWords[ds]={words:assign, over:false};
        remaining-=assign;
        actualEnd=ds;
        if(remaining<=0) break;
      }
      // cap이 부족해서 마감 전에 다 못 끝낸 경우 → 마감까지 균등 배분(초과 표시)
      if(remaining>0){
        dailyWords=buildDailyWords(schedStart, j.end, words);
        schedEnd=j.end;
      } else {
        schedEnd=actualEnd;
      }
    } else {
      dailyWords=buildDailyWords(schedStart, j.end, words);
      schedEnd=j.end;
    }

    const wdays=Object.keys(dailyWords).length||1;
    const baseWpd=Math.floor(words/wdays);
    cursor=offsetDate(schedEnd,1);
    return{...j,colorIdx:idx%COLORS.length,sortOrder:idx+1,schedStart,schedEnd,workDays:wdays,wordsPerDay:baseWpd,dailyWords,words};
  });
}
function calcParallel(sorted){
  return sorted.map((j,idx)=>{
    const words=parseInt(j.words);
    const wdays=Math.max(1,workDaysBetween(j.start,j.end));
    const dailyWords=buildDailyWords(j.start,j.end,words);
    const baseWpd=wdays>0?Math.floor(words/wdays):words;
    return{...j,colorIdx:idx%COLORS.length,sortOrder:idx+1,schedStart:j.start,schedEnd:j.end,workDays:wdays,wordsPerDay:baseWpd,dailyWords,words};
  });
}

/* ── 요약 ── */
function renderSummary(){
  const total=scheduleData.reduce((s,j)=>s+j.words,0);
  const maxEnd=scheduleData.reduce((a,b)=>a.schedEnd>b.schedEnd?a:b).schedEnd;
  const minStart=scheduleData.reduce((a,b)=>a.schedStart<b.schedStart?a:b).schedStart;
  const span=daysBetween(minStart,maxEnd)+1;
  const wkLabel={all:'전체 포함',none:'주말 제외',noSun:'일요일 제외',noSat:'토요일 제외'}[weekendMode];
  document.getElementById('summaryGrid').innerHTML=`
    <div class="metric"><div class="metric-label">작업 방식</div><div class="metric-val" style="font-size:13px">${mode==='sequential'?'순차 우선':'병렬 우선'} · ${wkLabel}</div></div>
    <div class="metric"><div class="metric-label">총 일감 수</div><div class="metric-val">${scheduleData.length}개</div></div>
    <div class="metric"><div class="metric-label">총 분량</div><div class="metric-val">${total.toLocaleString()}<span style="font-size:12px;font-weight:400;color:#aaa"> 단어</span></div></div>
    <div class="metric"><div class="metric-label">전체 기간</div><div class="metric-val">${span}<span style="font-size:12px;font-weight:400;color:#aaa"> 일</span></div></div>
  `;
}

/* ── 달력 ── */
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${MONTH_KO[calMonth]}`;
  const grid=document.getElementById('calGrid');grid.innerHTML='';

  DAY_KO.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='cal-day-header'+(i===0||i===6?' weekend':'');
    h.textContent=d;grid.appendChild(h);
  });

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;

  /* 각 셀 정보 먼저 계산 */
  const cells=[];
  for(let i=0;i<totalCells;i++){
    let y=calYear,m=calMonth,d,other=false;
    if(i<firstDay){d=prevDays-firstDay+i+1;m=calMonth-1;if(m<0){m=11;y--;}other=true;}
    else if(i>=firstDay+daysInMonth){d=i-firstDay-daysInMonth+1;m=calMonth+1;if(m>11){m=0;y++;}other=true;}
    else{d=i-firstDay+1;}
    cells.push({y,m,d,ds:dateStr(y,m,d),other,dow:new Date(y,m,d).getDay(),col:i%7});
  }

  cells.forEach((ci,i)=>{
    const cell=document.createElement('div');
    let cls='cal-cell';
    if(ci.other)cls+=' other-month';
    if(new Date(ci.y,ci.m,ci.d).getTime()===today.getTime())cls+=' today';
    if(!ci.other&&(ci.dow===0||ci.dow===6))cls+=' weekend-day';
    if(isSkippedWeekend(ci.ds))cls+=' skipped-day';
    cell.className=cls;

    const dd=document.createElement('div');dd.className='cal-date';dd.textContent=ci.d;cell.appendChild(dd);

    if(!isSkippedWeekend(ci.ds)){
      scheduleData.forEach(j=>{
        if(ci.ds>=j.schedStart&&ci.ds<=j.schedEnd){
          const c=COLORS[j.colorIdx];

          /* 이 셀 기준으로 막대의 위치 파악 */
          /* 실제 시작/끝인지, 아니면 주 경계인지 */
          const isJobStart=ci.ds===j.schedStart;
          const isJobEnd=ci.ds===j.schedEnd;
          const isWeekStart=ci.col===0; // 일요일 열
          const isWeekEnd=ci.col===6;   // 토요일 열

          /* 셀 기준 시각적 시작/끝 */
          const visStart=isJobStart||isWeekStart;
          const visEnd=isJobEnd||isWeekEnd;

          const bar=document.createElement('div');
          let barCls='bar';
          if(visStart&&visEnd) barCls+=' single';
          else if(visStart)    barCls+=' start';
          else if(visEnd)      barCls+=' end';
          else                 barCls+=' mid';
          bar.className=barCls;

          /* 시각적 시작 셀에만 테두리/배경 모두, mid/end는 상하만 */
          bar.style.background=c.bg;
          bar.style.color=c.text;
          if(visStart&&visEnd){
            bar.style.border=`0.5px solid ${c.border}`;
          } else if(visStart){
            bar.style.borderTop=`0.5px solid ${c.border}`;
            bar.style.borderBottom=`0.5px solid ${c.border}`;
            bar.style.borderLeft=`0.5px solid ${c.border}`;
            bar.style.borderRight='none';
          } else if(visEnd){
            bar.style.borderTop=`0.5px solid ${c.border}`;
            bar.style.borderBottom=`0.5px solid ${c.border}`;
            bar.style.borderRight=`0.5px solid ${c.border}`;
            bar.style.borderLeft='none';
          } else {
            bar.style.borderTop=`0.5px solid ${c.border}`;
            bar.style.borderBottom=`0.5px solid ${c.border}`;
            bar.style.borderLeft='none';
            bar.style.borderRight='none';
          }

          /* 텍스트: 날짜별 정확한 단어수 사용, 초과 시 빨간색 */
          const dayData=(j.dailyWords&&j.dailyWords[ci.ds]);
          const todayWords=dayData?dayData.words:0;
          const isOver=dayData&&dayData.over;
          if(isOver){
            bar.style.color='#c0392b';
            bar.style.fontWeight='600';
          }
          bar.textContent=visStart?`${j.name} (${todayWords.toLocaleString()})`:todayWords.toLocaleString();
          bar.title=`${j.name} | ${todayWords.toLocaleString()} 단어`+(isOver?' ⚠ 일일 한도 초과':'');
          cell.appendChild(bar);
        }
      });
    }
    grid.appendChild(cell);
  });
}

function renderLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  scheduleData.forEach(j=>{
    const c=COLORS[j.colorIdx];
    const pLabel=j.priority==='1'?'높음':j.priority==='2'?'보통':'낮음';
    const item=document.createElement('div');item.className='legend-item';
    item.innerHTML=`<span class="legend-dot" style="background:${c.bg};border:0.5px solid ${c.border}"></span><span>${j.sortOrder}순위 · <strong>${j.name}</strong> (${j.words.toLocaleString()}단어 · ${pLabel} · ${j.schedStart} ~ ${j.schedEnd} · 작업일 ${j.workDays}일)</span>`;
    leg.appendChild(item);
  });
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function downloadJSON(){
  const t=new Date();
  const yy=String(t.getFullYear()).slice(2);
  const mm=String(t.getMonth()+1).padStart(2,'0');
  const dd=String(t.getDate()).padStart(2,'0');
  const data=JSON.stringify({jobs,mode,weekendMode,dailyCap},null,2);
  const blob=new Blob([data],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`번역검수스케줄러_${yy}${mm}${dd}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function restoreFromJSON(data){
  try{
    const parsed=typeof data==='string'?JSON.parse(data):data;
    if(!parsed.jobs||!Array.isArray(parsed.jobs)||parsed.jobs.length<2)
      return alert('유효하지 않은 파일입니다.');
    jobs=parsed.jobs;
    if(parsed.mode)setMode(parsed.mode);
    if(parsed.weekendMode)setWeekend(parsed.weekendMode);
    if(parsed.dailyCap){dailyCap=parsed.dailyCap;const el=document.getElementById('dailyCap');if(el)el.value=parsed.dailyCap;}else{dailyCap=0;const el=document.getElementById('dailyCap');if(el)el.value='';}
    renderJobs();
    saveLS();
    // 접혀 있으면 펼치기
    if(!jobSectionOpen)toggleCollapse();
    document.getElementById('resultArea').style.display='none';
    scheduleData=[];
  }catch(e){alert('파일을 읽을 수 없습니다.');}
}

/* ── 드래그 드롭 ── */
function saveMemo(){
  const val=document.getElementById('memoBox').value;
  try{localStorage.setItem('trans_sched_memo',val);}catch(e){}
  const el=document.getElementById('memoSaved');
  el.textContent='저장됨';
  clearTimeout(saveMemo._t);
  saveMemo._t=setTimeout(()=>{el.textContent='';},1500);
}
function loadMemo(){
  try{
    const val=localStorage.getItem('trans_sched_memo');
    if(val!==null)document.getElementById('memoBox').value=val;
  }catch(e){}
}

function initDragDrop(){
  const overlay=document.getElementById('dropOverlay');
  let dragCount=0;
  document.addEventListener('dragenter',e=>{
    e.preventDefault();dragCount++;
    overlay.style.display='flex';
  });
  document.addEventListener('dragleave',()=>{
    dragCount--;
    if(dragCount<=0){dragCount=0;overlay.style.display='none';}
  });
  document.addEventListener('dragover',e=>e.preventDefault());
  document.addEventListener('drop',e=>{
    e.preventDefault();dragCount=0;overlay.style.display='none';
    const file=e.dataTransfer.files[0];
    if(!file||!file.name.endsWith('.json'))return alert('.json 파일만 불러올 수 있습니다.');
    const reader=new FileReader();
    reader.onload=ev=>restoreFromJSON(ev.target.result);
    reader.readAsText(file,'utf-8');
  });
}

if(!loadLS()){
  jobs.push(jobTemplate(1));
  jobs.push(jobTemplate(2));
}
renderJobs();
loadMemo();
initDragDrop();
</script>
